<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steve Index</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>The Steve Index</h1>
    <p>A catalog of every Steve in movies and TV!</p>
    <input type="text" id="search-bar" placeholder="Search for a Steve...">
  </header>
  
  <main>
    <table id="steve-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Title</th>
          <th>Actor</th>
          <th>Year</th>
          <th>Role Type</th>
          <th>Category</th>
          <th>Memorable Quote</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically populated -->
      </tbody>
    </table>
  </main>

  <footer>
    <p>Powered by the love of Steves.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
