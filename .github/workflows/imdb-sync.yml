name: IMDb Sync

on:
  schedule:
    - cron: "17 9 * * 1,3,5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
      IMDB_BULK_DIR: .data/imdb
      ARTIFACT_PROVIDER: r2
      ARTIFACT_BASE_URL: ${{ secrets.ARTIFACT_BASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
      SITE_URL: ${{ secrets.SITE_URL }}
      AUTO_PUBLISH_ACCEPTED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prepare IMDb dataset
        run: |
          mkdir -p "$IMDB_BULK_DIR"
          rm -f "$IMDB_BULK_DIR"/*.tsv "$IMDB_BULK_DIR"/*.tsv.gz
          for file in title.basics.tsv.gz title.principals.tsv.gz name.basics.tsv.gz; do
            curl --fail --silent --show-error --location "https://datasets.imdbws.com/$file" -o "$IMDB_BULK_DIR/$file"
          done

      - name: Run sync
        run: npm run sync:imdb
