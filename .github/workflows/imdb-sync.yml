name: IMDb Sync

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IMDB_BULK_DIR: .data/imdb
      IMDB_BULK_ARCHIVE_URL: ${{ secrets.IMDB_BULK_ARCHIVE_URL }}
      ARTIFACT_BASE_URL: ${{ secrets.ARTIFACT_BASE_URL }}
      ARTIFACT_WRITE_TOKEN: ${{ secrets.ARTIFACT_WRITE_TOKEN }}
      REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
      REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
      SITE_URL: ${{ secrets.SITE_URL }}
      AUTO_PUBLISH_ACCEPTED: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prepare IMDb dataset
        run: |
          mkdir -p "$IMDB_BULK_DIR"
          if [ -z "$IMDB_BULK_ARCHIVE_URL" ]; then
            echo "IMDB_BULK_ARCHIVE_URL is not configured."
            exit 1
          fi
          curl -L "$IMDB_BULK_ARCHIVE_URL" -o imdb-bulk.tar.gz
          tar -xzf imdb-bulk.tar.gz -C "$IMDB_BULK_DIR"

      - name: Run sync
        run: npm run sync:imdb
